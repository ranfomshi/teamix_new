<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#d69e2e"/>
  <!-- body/jersey -->
  <ellipse cx="50" cy="78" rx="30" ry="22" fill="#f6e05e"/>
  <!-- sweat bands on arms -->
  <ellipse cx="20" cy="60" rx="7" ry="5" fill="#e53e3e" transform="rotate(-20 20 60)"/>
  <ellipse cx="80" cy="60" rx="7" ry="5" fill="#e53e3e" transform="rotate(20 80 60)"/>
  <!-- face -->
  <circle cx="50" cy="44" r="22" fill="#fbd38d"/>
  <!-- sweatband -->
  <path d="M28,38 Q50,22 72,38" stroke="#e53e3e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- motion lines -->
  <line x1="10" y1="36" x2="22" y2="38" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="44" x2="22" y2="44" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="52" x2="22" y2="50" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- eyes determined -->
  <circle cx="41" cy="43" r="5.5" fill="#fff"/>
  <circle cx="59" cy="43" r="5.5" fill="#fff"/>
  <circle cx="41" cy="44" r="3.5" fill="#3d1f00"/>
  <circle cx="59" cy="44" r="3.5" fill="#3d1f00"/>
  <circle cx="41.8" cy="43.2" r="1.4" fill="#fff"/>
  <circle cx="59.8" cy="43.2" r="1.4" fill="#fff"/>
  <!-- gritted teeth / mouth open -->
  <path d="M40 54 Q50 62 60 54" stroke="#3d1f00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M40 54 Q50 59 60 54" fill="#f6e05e"/>
  <line x1="44" y1="54" x2="44" y2="58" stroke="#3d1f00" stroke-width="1"/>
  <line x1="50" y1="54" x2="50" y2="59" stroke="#3d1f00" stroke-width="1"/>
  <line x1="56" y1="54" x2="56" y2="58" stroke="#3d1f00" stroke-width="1"/>
</svg>
