<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="face1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="face2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="face3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- sparkle points -->
    <circle cx="18" cy="20" r="1.5" fill="#BAE6FD" opacity="0.8"/>
    <circle cx="80" cy="15" r="2" fill="#7DD3FC" opacity="0.6"/>
    <circle cx="86" cy="72" r="1.5" fill="#BAE6FD" opacity="0.5"/>
    <circle cx="14" cy="65" r="1" fill="#7DD3FC" opacity="0.7"/>
    <!-- diamond gem - large and faceted -->
    <!-- crown top row -->
    <polygon points="50,12 32,34 68,34" fill="url(#face2)"/>
    <polygon points="50,12 32,34 50,28" fill="#E0F2FE" opacity="0.6"/>
    <!-- main pavilion -->
    <polygon points="32,34 20,54 50,88 80,54 68,34" fill="url(#face1)"/>
    <!-- facet lines for depth -->
    <polygon points="32,34 20,54 50,60" fill="#0284C7" opacity="0.5"/>
    <polygon points="68,34 80,54 50,60" fill="#BAE6FD" opacity="0.3"/>
    <polygon points="32,34 68,34 50,60" fill="#38BDF8" opacity="0.4"/>
    <polygon points="20,54 50,88 50,60" fill="url(#face3)" opacity="0.7"/>
    <polygon points="80,54 50,88 50,60" fill="#0EA5E9" opacity="0.5"/>
    <!-- gem outline -->
    <polygon points="50,12 68,34 80,54 50,88 20,54 32,34" fill="none" stroke="#7DD3FC" stroke-width="1.5" opacity="0.7"/>
    <!-- top edge highlight -->
    <line x1="50" y1="12" x2="32" y2="34" stroke="#E0F2FE" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="50" y1="12" x2="68" y2="34" stroke="#E0F2FE" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- inner shine -->
    <ellipse cx="46" cy="38" rx="6" ry="4" fill="#fff" opacity="0.35" transform="rotate(-30 46 38)"/>
  </g>
</svg>
