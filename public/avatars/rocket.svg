<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#1E3A5F"/><stop offset="100%" stop-color="#020617"/></radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E2E8F0"/><stop offset="100%" stop-color="#94A3B8"/></linearGradient>
    <radialGradient id="flame" cx="50%" cy="0%" r="100%"><stop offset="0%" stop-color="#FCD34D"/><stop offset="50%" stop-color="#F97316"/><stop offset="100%" stop-color="#DC2626" stop-opacity="0"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <rect x="0" y="0" width="100" height="100" fill="url(#bg)"/>
    <!-- stars -->
    <circle cx="12" cy="15" r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="28" cy="8" r="1" fill="#fff" opacity="0.7"/>
    <circle cx="72" cy="12" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="88" cy="22" r="1.2" fill="#fff" opacity="0.6"/>
    <circle cx="18" cy="38" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="82" cy="35" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="90" cy="60" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="8" cy="68" r="1.5" fill="#fff" opacity="0.6"/>
    <!-- exhaust flame -->
    <ellipse cx="50" cy="90" rx="12" ry="16" fill="url(#flame)"/>
    <ellipse cx="50" cy="88" rx="7" ry="10" fill="#FEF3C7" opacity="0.8"/>
    <!-- rocket fins -->
    <path d="M34,72 L22,88 L38,80Z" fill="#EF4444"/>
    <path d="M66,72 L78,88 L62,80Z" fill="#EF4444"/>
    <!-- rocket body -->
    <rect x="36" y="36" width="28" height="40" rx="6" fill="url(#body)"/>
    <!-- nose cone -->
    <path d="M36,38 Q50,6 64,38Z" fill="#EF4444"/>
    <!-- window porthole -->
    <circle cx="50" cy="55" r="11" fill="#0EA5E9"/>
    <circle cx="50" cy="55" r="8" fill="#38BDF8"/>
    <circle cx="50" cy="55" r="5" fill="#7DD3FC"/>
    <circle cx="47" cy="52" r="2.5" fill="#fff" opacity="0.6"/>
    <!-- stripe -->
    <rect x="36" y="46" width="28" height="4" fill="#EF4444" opacity="0.7"/>
  </g>
</svg>
