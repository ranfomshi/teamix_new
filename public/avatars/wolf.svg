<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#6B7280"/><stop offset="100%" stop-color="#1F2937"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#9CA3AF"/><stop offset="100%" stop-color="#6B7280"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- ears -->
    <polygon points="22,46 34,10 46,42" fill="#9CA3AF"/>
    <polygon points="54,42 66,10 78,46" fill="#9CA3AF"/>
    <polygon points="26,44 34,16 42,42" fill="#F3F4F6"/>
    <polygon points="58,42 66,16 74,44" fill="#F3F4F6"/>
    <!-- head -->
    <ellipse cx="50" cy="54" rx="30" ry="28" fill="url(#face)"/>
    <!-- snout -->
    <ellipse cx="50" cy="64" rx="16" ry="13" fill="#E5E7EB"/>
    <!-- eyes — amber wolf eyes -->
    <ellipse cx="39" cy="49" rx="6" ry="6.5" fill="#fff"/>
    <ellipse cx="61" cy="49" rx="6" ry="6.5" fill="#fff"/>
    <circle cx="39.5" cy="49.5" r="4" fill="#D97706"/>
    <circle cx="61.5" cy="49.5" r="4" fill="#D97706"/>
    <circle cx="39.8" cy="49.8" r="2" fill="#111827"/>
    <circle cx="61.8" cy="49.8" r="2" fill="#111827"/>
    <circle cx="40.6" cy="48.6" r="1.1" fill="#fff"/>
    <circle cx="62.6" cy="48.6" r="1.1" fill="#fff"/>
    <!-- nose -->
    <ellipse cx="50" cy="60" rx="5" ry="4" fill="#374151"/>
    <!-- mouth -->
    <path d="M45 66 Q50 71 55 66" stroke="#374151" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="50" y1="64" x2="50" y2="66" stroke="#374151" stroke-width="1.5"/>
  </g>
</svg>
