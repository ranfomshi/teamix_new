    <ellipse cx="62" cy="56" rx="8" ry="9" fill="#5B21B6"/>
    <circle cx="40" cy="56" r="3.5" fill="#EDE9FE"/>
    <circle cx="64" cy="56" r="3.5" fill="#EDE9FE"/>
    <!-- O-mouth surprised -->
