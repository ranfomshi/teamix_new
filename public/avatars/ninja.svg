<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#374151"/><stop offset="100%" stop-color="#030712"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- head wrap layers -->
    <ellipse cx="50" cy="52" rx="32" ry="30" fill="#1F2937"/>
    <!-- eye slit opening -->
    <rect x="27" y="44" width="46" height="17" rx="5" fill="#111827"/>
    <!-- fierce glowing eyes -->
    <ellipse cx="38" cy="52" rx="6.5" ry="5" fill="#DC2626"/>
    <ellipse cx="62" cy="52" rx="6.5" ry="5" fill="#DC2626"/>
    <ellipse cx="38.5" cy="52.5" rx="4" ry="3" fill="#7F1D1D"/>
    <ellipse cx="62.5" cy="52.5" rx="4" ry="3" fill="#7F1D1D"/>
    <circle cx="39.5" cy="51.5" r="1.4" fill="#FCA5A5"/>
    <circle cx="63.5" cy="51.5" r="1.4" fill="#FCA5A5"/>
    <!-- top wrap bands -->
    <path d="M18,46 Q50,18 82,46" stroke="#1F2937" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M18,48 Q50,20 82,48" stroke="#374151" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M20,42 Q50,16 80,42" stroke="#4B5563" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- chin/lower wrap -->
    <path d="M22,60 Q50,80 78,60" stroke="#1F2937" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M23,58 Q50,76 77,58" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- throwing star motif -->
    <path d="M82,20 L84,26 L90,24 L85,29 L90,34 L84,32 L82,38 L80,32 L74,34 L79,29 L74,24 L80,26Z" fill="#6B7280" opacity="0.6"/>
  </g>
</svg>
