<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#16A34A"/><stop offset="100%" stop-color="#052E16"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FDE68A"/></radialGradient>
    <radialGradient id="glove" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#D97706"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- jersey body -->
    <ellipse cx="50" cy="82" rx="36" ry="26" fill="#FBBF24"/>
    <path d="M20 72 Q50 66 80 72 L80 100 L20 100Z" fill="#F59E0B"/>
    <!-- gloves reaching out -->
    <ellipse cx="12" cy="60" rx="13" ry="10" fill="url(#glove)" transform="rotate(-15 12 60)"/>
    <rect x="6" y="54" width="8" height="13" rx="3" fill="#D97706" transform="rotate(-15 10 60)"/>
    <ellipse cx="88" cy="60" rx="13" ry="10" fill="url(#glove)" transform="rotate(15 88 60)"/>
    <rect x="86" y="54" width="8" height="13" rx="3" fill="#D97706" transform="rotate(15 88 60)"/>
    <!-- face -->
    <ellipse cx="50" cy="47" rx="22" ry="21" fill="url(#face)"/>
    <!-- focused eyes with slight squint -->
    <ellipse cx="40" cy="43" rx="6" ry="5.5" fill="#fff"/>
    <ellipse cx="60" cy="43" rx="6" ry="5.5" fill="#fff"/>
    <circle cx="40.5" cy="43.5" r="3.5" fill="#1A0A00"/>
    <circle cx="60.5" cy="43.5" r="3.5" fill="#1A0A00"/>
    <circle cx="41.4" cy="42.4" r="1.3" fill="#fff"/>
    <circle cx="61.4" cy="42.4" r="1.3" fill="#fff"/>
    <!-- furrowed brow — concentration -->
    <path d="M34 38 Q40 35 46 38" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M54 38 Q60 35 66 38" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- set determined mouth -->
    <path d="M42 55 Q50 52 58 55" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- sweatband -->
    <path d="M28 36 Q50 26 72 36" stroke="#16A34A" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
