<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#15803D"/>
      <stop offset="100%" stop-color="#052E16"/>
    </radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- bright yellow kit body -->
    <path d="M10,100 Q10,68 50,62 Q90,68 90,100Z" fill="#FBBF24"/>
    <path d="M10,100 Q10,72 50,66 Q90,72 90,100Z" fill="#F59E0B"/>
    <!-- face -->
    <ellipse cx="50" cy="44" rx="24" ry="22" fill="url(#face)"/>
    <!-- keeper gloves — simple bold yellow rectangles either side -->
    <rect x="4" y="52" width="18" height="22" rx="9" fill="#FBBF24"/>
    <rect x="6" y="50" width="14" height="10" rx="4" fill="#F59E0B"/>
    <rect x="78" y="52" width="18" height="22" rx="9" fill="#FBBF24"/>
    <rect x="80" y="50" width="14" height="10" rx="4" fill="#F59E0B"/>
    <!-- green keeper strip on gloves -->
    <rect x="6" y="60" width="14" height="4" rx="2" fill="#16A34A"/>
    <rect x="80" y="60" width="14" height="4" rx="2" fill="#16A34A"/>
    <!-- focused eyes -->
    <ellipse cx="40" cy="41" rx="6.5" ry="6" fill="#fff"/>
    <ellipse cx="60" cy="41" rx="6.5" ry="6" fill="#fff"/>
    <circle cx="40.5" cy="41.5" r="4" fill="#1A1A2E"/>
    <circle cx="60.5" cy="41.5" r="4" fill="#1A1A2E"/>
    <circle cx="41.5" cy="40.3" r="1.6" fill="#fff"/>
    <circle cx="61.5" cy="40.3" r="1.6" fill="#fff"/>
    <!-- stern set brow -->
    <path d="M33 35 Q40 32 47 35" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M53 35 Q60 32 67 35" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- tight lips -->
    <path d="M42 52 Q50 49 58 52" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- green headband -->
    <path d="M26 32 Q50 20 74 32" stroke="#16A34A" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
