<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#FB923C"/><stop offset="100%" stop-color="#C2410C"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#FED7AA"/><stop offset="100%" stop-color="#FDBA74"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- ears -->
    <polygon points="20,50 32,10 48,44" fill="#F97316"/>
    <polygon points="52,44 68,10 80,50" fill="#F97316"/>
    <!-- dark ear tips -->
    <polygon points="24,48 32,16 44,44" fill="#111827"/>
    <polygon points="56,44 68,16 76,48" fill="#111827"/>
    <!-- head -->
    <ellipse cx="50" cy="54" rx="30" ry="28" fill="url(#face)"/>
    <!-- white lower face / muzzle -->
    <ellipse cx="50" cy="66" rx="18" ry="14" fill="#FFFBEB"/>
    <!-- eyes — sharp green fox eyes -->
    <ellipse cx="38" cy="48" rx="6" ry="6.5" fill="#fff"/>
    <ellipse cx="62" cy="48" rx="6" ry="6.5" fill="#fff"/>
    <circle cx="38.5" cy="48.5" r="4" fill="#16A34A"/>
    <circle cx="62.5" cy="48.5" r="4" fill="#16A34A"/>
    <ellipse cx="38.8" cy="48.8" rx="2" ry="3" fill="#111827"/>
    <ellipse cx="62.8" cy="48.8" rx="2" ry="3" fill="#111827"/>
    <circle cx="39.5" cy="47.5" r="1.1" fill="#fff"/>
    <circle cx="63.5" cy="47.5" r="1.1" fill="#fff"/>
    <!-- nose -->
    <ellipse cx="50" cy="61" rx="4.5" ry="3.5" fill="#111827"/>
    <!-- mouth -->
    <path d="M45 66 Q50 71 55 66" stroke="#7C2D12" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="50" y1="61" x2="50" y2="66" stroke="#7C2D12" stroke-width="1.5"/>
  </g>
</svg>
