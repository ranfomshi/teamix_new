<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#DC2626"/><stop offset="100%" stop-color="#7F1D1D"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#D97706"/></radialGradient>
    <linearGradient id="helm" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#9CA3AF"/><stop offset="100%" stop-color="#4B5563"/></linearGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- beard - big braided blonde beard -->
    <ellipse cx="50" cy="74" rx="24" ry="18" fill="#FBBF24"/>
    <!-- beard braid lines -->
    <path d="M38 64 Q42 70 38 76 Q42 82 38 88" stroke="#D97706" stroke-width="1.5" fill="none"/>
    <path d="M50 66 Q54 72 50 78 Q54 84 50 90" stroke="#D97706" stroke-width="1.5" fill="none"/>
    <path d="M62 64 Q58 70 62 76 Q58 82 62 88" stroke="#D97706" stroke-width="1.5" fill="none"/>
    <!-- face -->
    <ellipse cx="50" cy="54" rx="24" ry="22" fill="url(#face)"/>
    <!-- helmet -->
    <ellipse cx="50" cy="40" rx="26" ry="20" fill="url(#helm)"/>
    <ellipse cx="50" cy="32" rx="24" ry="14" fill="#6B7280"/>
    <!-- nose guard -->
    <rect x="47" y="36" width="6" height="18" rx="2" fill="#4B5563"/>
    <!-- helmet rim -->
    <rect x="24" y="48" width="52" height="7" rx="3" fill="#6B7280"/>
    <!-- horns -->
    <path d="M24,44 Q8,28 12,10 Q18,28 28,44Z" fill="#9CA3AF"/>
    <path d="M76,44 Q92,28 88,10 Q82,28 72,44Z" fill="#9CA3AF"/>
    <!-- eyes fierce blue -->
    <ellipse cx="38" cy="51" rx="5.5" ry="6" fill="#fff"/>
    <ellipse cx="62" cy="51" rx="5.5" ry="6" fill="#fff"/>
    <circle cx="38.5" cy="51.5" r="3.5" fill="#1D4ED8"/>
    <circle cx="62.5" cy="51.5" r="3.5" fill="#1D4ED8"/>
    <circle cx="39.4" cy="50.4" r="1.3" fill="#fff"/>
    <circle cx="63.4" cy="50.4" r="1.3" fill="#fff"/>
    <!-- mustache -->
    <path d="M38 62 Q44 57 50 62 Q56 57 62 62" stroke="#D97706" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
