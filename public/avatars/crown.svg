<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#1C0A00"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="30%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- glow -->
    <ellipse cx="50" cy="55" rx="36" ry="20" fill="#FCD34D" opacity="0.07"/>
    <!-- crown body -->
    <path d="M16,72 L16,44 L30,58 L50,22 L70,58 L84,44 L84,72Z" fill="url(#gold)"/>
    <!-- crown base band -->
    <rect x="16" y="68" width="68" height="12" rx="4" fill="url(#gold2)"/>
    <!-- band highlight -->
    <rect x="16" y="68" width="68" height="4" rx="4" fill="#FEF9C3" opacity="0.4"/>
    <!-- gems on points -->
    <circle cx="50" cy="22" r="6" fill="#DC2626"/>
    <circle cx="50" cy="22" r="4" fill="#EF4444"/>
    <circle cx="50" cy="22" r="2" fill="#FCA5A5"/>
    <circle cx="30" cy="58" r="5" fill="#1D4ED8"/>
    <circle cx="30" cy="58" r="3" fill="#60A5FA"/>
    <circle cx="70" cy="58" r="5" fill="#15803D"/>
    <circle cx="70" cy="58" r="3" fill="#4ADE80"/>
    <!-- band gems -->
    <rect x="44" y="70" width="12" height="8" rx="3" fill="#DC2626"/>
    <rect x="46" y="71" width="8" height="6" rx="2" fill="#EF4444"/>
    <circle cx="28" cy="74" r="4" fill="#7C3AED"/>
    <circle cx="28" cy="74" r="2.5" fill="#A78BFA"/>
    <circle cx="72" cy="74" r="4" fill="#0369A1"/>
    <circle cx="72" cy="74" r="2.5" fill="#38BDF8"/>
  </g>
