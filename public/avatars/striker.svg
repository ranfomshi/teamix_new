<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#DC2626"/><stop offset="100%" stop-color="#450A0A"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FDE68A"/></radialGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="65%"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- jersey -->
    <ellipse cx="50" cy="82" rx="36" ry="26" fill="#fff"/>
    <path d="M20 72 Q50 65 80 72 L80 100 L20 100Z" fill="#E2E8F0"/>
    <path d="M44 65 L44 95" stroke="#DC2626" stroke-width="3"/>
    <path d="M56 65 L56 95" stroke="#DC2626" stroke-width="3"/>
    <!-- football -->
    <circle cx="76" cy="70" r="15" fill="url(#ball)"/>
    <polygon points="76,58 70,64 72,72 80,72 82,64" fill="#111827"/>
    <line x1="76" y1="58" x2="76" y2="55" stroke="#111827" stroke-width="1.5"/>
    <line x1="70" y1="64" x2="67" y2="61" stroke="#111827" stroke-width="1.5"/>
    <line x1="82" y1="64" x2="85" y2="61" stroke="#111827" stroke-width="1.5"/>
    <line x1="72" y1="72" x2="70" y2="75" stroke="#111827" stroke-width="1.5"/>
    <line x1="80" y1="72" x2="82" y2="75" stroke="#111827" stroke-width="1.5"/>
    <!-- face -->
    <ellipse cx="46" cy="46" rx="22" ry="21" fill="url(#face)"/>
    <!-- big excited eyes -->
    <ellipse cx="36" cy="42" rx="6.5" ry="7" fill="#fff"/>
    <ellipse cx="56" cy="42" rx="6.5" ry="7" fill="#fff"/>
    <circle cx="36.5" cy="42.5" r="4.5" fill="#0C4A6E"/>
    <circle cx="56.5" cy="42.5" r="4.5" fill="#0C4A6E"/>
    <circle cx="37.5" cy="41.2" r="1.8" fill="#fff"/>
    <circle cx="57.5" cy="41.2" r="1.8" fill="#fff"/>
    <!-- wide open goal-celebration grin -->
    <path d="M34 54 Q46 65 58 54" stroke="#7C2D12" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M36 54 Q46 62 56 54 Q46 60 36 54Z" fill="#DC2626"/>
    <!-- raised eyebrows in excitement -->
    <path d="M30 37 Q36 33 42 36" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M50 36 Q56 33 62 37" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
