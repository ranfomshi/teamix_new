<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#A16207"/><stop offset="100%" stop-color="#5C3D11"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#D4A056"/><stop offset="100%" stop-color="#B8860B"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- ears -->
    <circle cx="24" cy="26" r="15" fill="#78350F"/>
    <circle cx="76" cy="26" r="15" fill="#78350F"/>
    <circle cx="24" cy="26" r="10" fill="#D97706"/>
    <circle cx="76" cy="26" r="10" fill="#D97706"/>
    <!-- head -->
    <ellipse cx="50" cy="55" rx="31" ry="29" fill="url(#face)"/>
    <!-- snout -->
    <ellipse cx="50" cy="65" rx="14" ry="11" fill="#FBBF24"/>
    <!-- eyes -->
    <ellipse cx="38" cy="49" rx="6" ry="6.5" fill="#fff"/>
    <ellipse cx="62" cy="49" rx="6" ry="6.5" fill="#fff"/>
    <circle cx="38.5" cy="49.5" r="3.8" fill="#1A0A00"/>
    <circle cx="62.5" cy="49.5" r="3.8" fill="#1A0A00"/>
    <circle cx="39.4" cy="48.4" r="1.4" fill="#fff"/>
    <circle cx="63.4" cy="48.4" r="1.4" fill="#fff"/>
    <!-- nose -->
    <ellipse cx="50" cy="61" rx="5.5" ry="4.5" fill="#1A0A00"/>
    <ellipse cx="50" cy="60" rx="3" ry="2" fill="#374151" opacity="0.3"/>
    <!-- mouth -->
    <path d="M44 66 Q50 72 56 66" stroke="#5C3D11" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="50" y1="61" x2="50" y2="66" stroke="#5C3D11" stroke-width="1.8"/>
  </g>
</svg>
