<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="skin" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- stars -->
    <circle cx="14" cy="16" r="1.5" fill="#6EE7B7" opacity="0.5"/>
    <circle cx="82" cy="12" r="1" fill="#6EE7B7" opacity="0.4"/>
    <circle cx="88" cy="42" r="1.5" fill="#6EE7B7" opacity="0.3"/>
    <circle cx="10" cy="70" r="1" fill="#6EE7B7" opacity="0.4"/>
    <!-- alien body/torso hint -->
    <ellipse cx="50" cy="86" rx="22" ry="18" fill="#059669" opacity="0.6"/>
    <!-- large cranium — classic alien -->
    <ellipse cx="50" cy="36" rx="30" ry="32" fill="url(#skin)"/>
    <!-- chin narrows to point -->
    <path d="M32,52 Q50,70 68,52 Q60,64 50,68 Q40,64 32,52Z" fill="url(#skin)"/>
    <!-- cranium highlight -->
    <ellipse cx="44" cy="26" rx="14" ry="10" fill="#A7F3D0" opacity="0.4"/>
    <!-- huge wrap-around eyes -->
    <ellipse cx="36" cy="46" rx="13" ry="10" fill="#111827"/>
    <ellipse cx="64" cy="46" rx="13" ry="10" fill="#111827"/>
    <!-- iris — glowing -->
    <ellipse cx="36" cy="46" rx="9" ry="7" fill="#065F46"/>
    <ellipse cx="64" cy="46" rx="9" ry="7" fill="#065F46"/>
    <ellipse cx="36" cy="46" rx="6" ry="5" fill="#34D399"/>
    <ellipse cx="64" cy="46" rx="6" ry="5" fill="#34D399"/>
    <ellipse cx="36" cy="46" rx="3" ry="4" fill="#111827"/>
    <ellipse cx="64" cy="46" rx="3" ry="4" fill="#111827"/>
    <circle cx="37.5" cy="44.5" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="65.5" cy="44.5" r="2" fill="#fff" opacity="0.8"/>
    <!-- tiny slit nostrils -->
    <line x1="47" y1="58" x2="49" y2="60" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="53" y1="58" x2="51" y2="60" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
    <!-- thin lips -->
    <path d="M40 64 Q50 68 60 64" stroke="#047857" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- antenna -->
    <line x1="50" y1="8" x2="50" y2="18" stroke="#6EE7B7" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="6" r="4" fill="#34D399"/>
    <circle cx="50" cy="6" r="2.5" fill="#A7F3D0"/>
  </g>
</svg>
