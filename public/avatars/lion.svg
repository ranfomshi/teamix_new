<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#D97706"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FDE68A"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- mane outer -->
    <circle cx="50" cy="55" r="38" fill="#92400E"/>
    <!-- mane inner -->
    <circle cx="50" cy="53" r="32" fill="#B45309"/>
    <!-- ears -->
    <ellipse cx="22" cy="24" rx="11" ry="11" fill="#D97706"/>
    <ellipse cx="78" cy="24" rx="11" ry="11" fill="#D97706"/>
    <ellipse cx="22" cy="24" rx="7" ry="7" fill="#FDE68A"/>
    <ellipse cx="78" cy="24" rx="7" ry="7" fill="#FDE68A"/>
    <!-- face -->
    <ellipse cx="50" cy="47" rx="23" ry="21" fill="url(#face)"/>
    <!-- brow fur line -->
    <path d="M34 39 Q50 35 66 39" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- eyes -->
    <ellipse cx="41" cy="44" rx="5.5" ry="6" fill="#fff"/>
    <ellipse cx="59" cy="44" rx="5.5" ry="6" fill="#fff"/>
    <circle cx="41.5" cy="44.5" r="3.5" fill="#1A0A00"/>
    <circle cx="59.5" cy="44.5" r="3.5" fill="#1A0A00"/>
    <circle cx="42.4" cy="43.4" r="1.4" fill="#fff"/>
    <circle cx="60.4" cy="43.4" r="1.4" fill="#fff"/>
    <!-- nose -->
    <path d="M46 54 Q50 51 54 54 Q50 58 46 54Z" fill="#B45309"/>
    <!-- mouth -->
    <path d="M44 59 Q50 65 56 59" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- whiskers -->
    <line x1="25" y1="51" x2="44" y2="53" stroke="#B45309" stroke-width="1.2" opacity="0.6"/>
    <line x1="25" y1="56" x2="44" y2="56" stroke="#B45309" stroke-width="1.2" opacity="0.6"/>
    <line x1="75" y1="51" x2="56" y2="53" stroke="#B45309" stroke-width="1.2" opacity="0.6"/>
    <line x1="75" y1="56" x2="56" y2="56" stroke="#B45309" stroke-width="1.2" opacity="0.6"/>
  </g>
</svg>
