<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#15803D"/><stop offset="100%" stop-color="#052E16"/></radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FDE68A"/></radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
    <!-- jersey white -->
    <ellipse cx="50" cy="82" rx="36" ry="26" fill="#fff"/>
    <path d="M20 72 Q50 65 80 72 L80 100 L20 100Z" fill="#F1F5F9"/>
    <!-- racket frame -->
    <ellipse cx="78" cy="32" rx="14" ry="17" fill="none" stroke="#A16207" stroke-width="3.5"/>
    <ellipse cx="78" cy="32" rx="14" ry="17" fill="rgb(255 255 255 / 8%)"/>
    <!-- racket strings -->
    <line x1="66" y1="18" x2="66" y2="46" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="71" y1="15" x2="71" y2="49" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="78" y1="15" x2="78" y2="49" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="85" y1="15" x2="85" y2="49" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="90" y1="18" x2="90" y2="46" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="64" y1="22" x2="92" y2="22" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="64" y1="27" x2="92" y2="27" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="64" y1="32" x2="92" y2="32" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="64" y1="37" x2="92" y2="37" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <line x1="64" y1="42" x2="92" y2="42" stroke="#D97706" stroke-width="1.2" opacity="0.8"/>
    <!-- racket handle -->
    <rect x="73" y="47" width="10" height="22" rx="4" fill="#92400E"/>
    <rect x="75" y="54" width="6" height="3" rx="1" fill="#78350F"/>
    <!-- tennis ball -->
    <circle cx="55" cy="66" r="9" fill="#A3E635"/>
    <path d="M48,60 Q55,67 62,60" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M48,72 Q55,65 62,72" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- face -->
    <ellipse cx="40" cy="47" rx="20" ry="20" fill="url(#face)"/>
    <!-- white cap/visor -->
    <path d="M20,42 Q40,24 60,42" fill="#fff"/>
    <rect x="18" y="40" width="44" height="6" rx="3" fill="#E2E8F0"/>
    <!-- eyes focused -->
    <ellipse cx="32" cy="46" rx="5.5" ry="6" fill="#fff"/>
    <ellipse cx="50" cy="46" rx="5.5" ry="6" fill="#fff"/>
    <circle cx="32.5" cy="46.5" r="3.5" fill="#1A1A2E"/>
    <circle cx="50.5" cy="46.5" r="3.5" fill="#1A1A2E"/>
    <circle cx="33.4" cy="45.4" r="1.3" fill="#fff"/>
    <circle cx="51.4" cy="45.4" r="1.3" fill="#fff"/>
    <!-- focused smile -->
    <path d="M30 57 Q41 62 52 57" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
